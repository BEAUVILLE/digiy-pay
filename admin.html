<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MON ARGENT PRO — Admin</title>

<script>
window.DIGIY_SUPABASE_URL="https://wesqmwjjtsefyjnluosj.supabase.co";
window.DIGIY_SUPABASE_ANON_KEY="sb_publishable_tGHItRgeWDmGjnd0CK1DVQ_BIep4Ug3";
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:system-ui;
background:#02140f;
color:white;
padding:20px;
}

.wrap{max-width:700px;margin:auto}

.card{
background:#041c15;
padding:20px;
border-radius:16px;
border:1px solid #134e4a;
}

h1{color:#22c55e}

input{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid #134e4a;
background:#02140f;
color:white;
}

.btn{
margin-top:14px;
padding:12px;
border-radius:999px;
border:none;
background:#22c55e;
color:black;
font-weight:700;
cursor:pointer;
width:100%;
}

.btn.ghost{
background:transparent;
border:1px solid #22c55e;
color:#22c55e;
}

.small{
font-size:12px;
color:#cbd5f5;
margin-top:6px;
}

.sep{
margin:20px 0;
height:1px;
background:#134e4a;
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">

<h1>MON ARGENT PRO</h1>
<div class="small">Administration du wallet</div>

<div class="sep"></div>

<label>Nom affiché</label>
<input id="walletName">

<label>Code pro</label>
<input id="walletCode">

<label>Numéro Wave</label>
<input id="walletPhone">

<label>Slug session</label>
<input id="walletSlug" readonly>

<button class="btn" id="btnSave">💾 Sauvegarder</button>

<button class="btn ghost" onclick="openCockpit()">📊 Ouvrir Cockpit</button>

<button class="btn ghost" onclick="logout()">🚪 Déconnexion</button>

</div>

</div>

<script>

const sb=supabase.createClient(
window.DIGIY_SUPABASE_URL,
window.DIGIY_SUPABASE_ANON_KEY
)

const nameInput=document.getElementById("walletName")
const codeInput=document.getElementById("walletCode")
const phoneInput=document.getElementById("walletPhone")
const slugInput=document.getElementById("walletSlug")

let session=JSON.parse(localStorage.getItem("DIGIY_PAY_PRO_SESSION")||"{}")

slugInput.value=session.slug||""

async function loadWallet(){

if(!session.phone) return

let {data}=await sb
.from("digiy_pay_pro")
.select("*")
.eq("wave_phone",session.phone)
.maybeSingle()

if(!data) return

nameInput.value=data.business_name||""
codeInput.value=data.business_code||""
phoneInput.value=data.wave_phone||""

}

async function saveWallet(){

let payload={
business_name:nameInput.value,
business_code:codeInput.value,
wave_phone:phoneInput.value,
is_active:true
}

await sb
.from("digiy_pay_pro")
upsert(payload)

alert("Wallet sauvegardé")

}

function openCockpit(){
location.href="cockpit.html"
}

function logout(){
localStorage.removeItem("DIGIY_PAY_PRO_SESSION")
location.href="pin.html"
}

document.getElementById("btnSave").onclick=saveWallet

loadWallet()

</script>

</body>
</html>
