name: Patch index link to PAY inscription

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-index-link-inscription-pay.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Link index to inscription-pay
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          html = path.read_text(encoding="utf-8")
          before = html
          inscription = "./inscription-pay.html"

          # 1) Si le bloc pro public existe déjà, il doit envoyer vers l'inscription PAY, pas directement vers commencer-a-payer.
          html = html.replace('href="https://commencer-a-payer.digiylyfe.com/?module=PAY"', f'href="{inscription}"')
          html = html.replace("href='https://commencer-a-payer.digiylyfe.com/?module=PAY'", f"href='{inscription}'")

          # 2) Corrige les libellés si besoin.
          html = html.replace(">🚀 Activer PAY</a>", ">🚀 Inscription PAY</a>")
          html = html.replace(">🚀 Activer mon module PAY</a>", ">🚀 Inscription PAY</a>")

          # 3) Si aucun bouton inscription n'existe dans la ligne héro, on l'ajoute après Tarifs.
          hero_tarifs = '<a class="hero-action-secondary" href="https://tarifs.digiylyfe.com/" target="_blank" rel="noopener noreferrer">📦 Tarifs</a>'
          hero_inscription = f'<a class="hero-action-secondary" href="{inscription}">🚀 Inscription PAY</a>'
          if hero_tarifs in html and 'href="./inscription-pay.html"' not in html.split('</div>', 1)[0]:
              # Ajout global si pas déjà présent dans cette zone : plus sûr avec remplacement unique.
              html = html.replace(hero_tarifs, hero_tarifs + "\n            " + hero_inscription, 1)

          # 4) Dans la maison DIGIY / retours, ajoute une porte inscription si elle n'existe pas déjà.
          tarifs_btn = '<a class="btn gold" href="https://tarifs.digiylyfe.com/" target="_blank" rel="noopener noreferrer">📦 Tarifs</a>'
          inscription_btn = f'<a class="btn primary" href="{inscription}">🚀 Inscription PAY</a>'
          if tarifs_btn in html and inscription_btn not in html:
              html = html.replace(tarifs_btn, tarifs_btn + "\n          " + inscription_btn, 1)

          # 5) Barre du bas : remplace Tarifs par Inscription PAY si possible, sinon laisse Tarifs et ajoute dans le hero.
          bottom_tarifs = '<a href="https://tarifs.digiylyfe.com/" target="_blank" rel="noopener noreferrer"><span class="ico">📦</span><span>Tarifs</span></a>'
          bottom_inscription = f'<a href="{inscription}"><span class="ico">🚀</span><span>Inscrire</span></a>'
          if bottom_tarifs in html and bottom_inscription not in html:
              html = html.replace(bottom_tarifs, bottom_inscription, 1)

          # 6) Met à jour meta build pour casser un peu le cache.
          html = html.replace('pay-public-20260510-v1-doctrine', 'pay-public-inscription-link-20260529')

          if html == before:
              print("Aucun changement : lien déjà posé ou structure différente.")
          else:
              path.write_text(html, encoding="utf-8")
              print("Index PAY relié à inscription-pay.html")
          PY

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Link PAY public index to inscription page"
          git push
